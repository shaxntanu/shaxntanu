name: Update README Date

on:
  schedule:
    - cron: "0 0 * * *" # Run daily at midnight UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Update date in README
        run: |
          # Get current date in format: Month Day, Year
          CURRENT_DATE=$(date -u +"%B %d, %Y")
          
          # Update the date line in README.md
          sed -i "s/\*Updated: .*\*/\*Updated: $CURRENT_DATE\*/g" README.md
          
      - name: Commit and push if changed
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add README.md
          git diff --staged --quiet || git commit -m "Update README date to $(date -u +"%B %d, %Y")"
          git pull --rebase
          git push
