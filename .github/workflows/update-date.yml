name: Update README Date

on:
  schedule:
    - cron: "0 0 * * *" # Run daily at midnight UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Update date in README
        run: |
          # Set timezone to IST (Indian Standard Time)
          export TZ='Asia/Kolkata'
          
          # Get current date in IST format: Month Day, Year
          CURRENT_DATE=$(date +"%B %d, %Y")
          
          # Update the date line in README.md (without "Updated:")
          sed -i "s/\*[A-Za-z]* [0-9]*, [0-9]*\*/\*$CURRENT_DATE\*/g" README.md
          
      - name: Commit and push if changed
        run: |
          export TZ='Asia/Kolkata'
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add README.md
          git diff --staged --quiet || git commit -m "Update README date to $(date +"%B %d, %Y")"
          git pull --rebase
          git push
